<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fórum Jackson Storm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color: #0A0A0A;">

    <main class="d-flex flex-column align-items-center justify-content-center vh-100">

        <img src="assets/img/logo.png" alt="logo" class="img-fluid w-25 mb-4">

        <div class="container" style="max-width: 400px;">

            <div class="card p-4 border rounded-3"
                style="background-color: #1C1C1E; border-color: #008fef; color: #00AEEF;">

                <h2 id="titulo" class="text-center mb-4" style="color: #00AEEF;">
                    Login
                </h2>

                <form id="form-login">

                    <div class="mb-3">
                        <label for="usuario" class="form-label">Usuário</label>
                        <input type="text" id="usuario" class="form-control" placeholder="Usuário" required>
                    </div>

                    <div class="mb-3">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" id="senha" class="form-control" placeholder="Senha" required>
                    </div>

                    <button id="button" type="submit" class="btn btn-primary w-100">
                        Entrar
                    </button>
                </form>

                <div id="mensagem" class="mt-3"></div>
            </div>

        </div>
    </main>

    <script src="scripts/login.js"></script>

</body>

</html>
